name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          export CI=true
          npm test

      - name: Package extension
        run: npx @vscode/vsce package -o json-hydrate.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: json-hydrate.vsix
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          generate_release_notes: true

      - name: Publish to Visual Studio Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -p $VSCE_PAT --packagePath json-hydrate.vsix

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npx ovsx publish json-hydrate.vsix
